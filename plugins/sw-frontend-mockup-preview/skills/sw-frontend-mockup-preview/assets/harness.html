<!DOCTYPE html>
<!--
  mockup-preview harness — copy this file, then fill the marked regions.
  THROWAWAY: it doesn't need to follow the project's CSS conventions
  (kebab-case / inline styles are fine here). Only the code applied to the
  real component later follows the project rules.

  Regions to fill:
    1. <title>     — name of the screen/component being explored
    2. TOKENS      — paste the real design tokens into BOTH [data-theme] blocks
    3. FONT <link> — swap to the project's real font if not Inter
    4. .stage      — one <section class="variation"> per variation

  Built-in toolbar (no need to touch the chrome):
    • Variation tabs — appear automatically when there's >1 variation; show ONE at a time
    • Viewport       — 📱 mobile / 💻 tablet / 🖥 desktop / ⛶ full (constrains the canvas)
    • Theme          — ☀️/🌙 toggles the canvas theme live (single canvas, no duplicated panels)
    • Font           — dropdown to preview the mockup with different fonts (loads Google Fonts on demand)

  Responsive: the canvas (.hz-frame) is a CSS container. Write responsive rules with
  @container (max-width: ...) so the viewport toggle triggers REAL breakpoints. Prefer
  intrinsic layouts (auto-fit/minmax, flex-wrap, clamp) so it reflows cleanly.

  URL state: open a specific state directly with ?vw=mobile|tablet|desktop|full,
  ?theme=light|dark, ?v=<n> (1-based variation), ?font=<name>. Used for fast no-click
  screenshots and for sharing a precise state.
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!-- 1. COMPONENT NAME -->Mockup Preview</title>

<!-- 3. FONT — replace href + family if the project uses another font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     2. TOKENS — paste the project's real values into BOTH blocks.
     They live on [data-theme] so the canvas can switch live.
     This is what makes the mockup faithful: same colors/spacing/radius
     as production.
     ============================================================ */
  [data-theme="light"] {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --border-color: #e2e8f0;
    --accent-primary: #3b82f6;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --font-sans: 'Inter', system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-card: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --border-color: #334155;
    --accent-primary: #3b82f6;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --font-sans: 'Inter', system-ui, sans-serif;
  }

  /* ---- harness chrome (not part of the design) ---- */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #e9edf3; color: #0f172a; }

  .hz-toolbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; flex-wrap: wrap; align-items: center; gap: 1.25rem;
    padding: 0.6rem 1rem; background: #ffffff; border-bottom: 1px solid #d8dee8;
    box-shadow: 0 1px 3px rgba(15,23,42,.06);
  }
  .hz-group { display: flex; align-items: center; gap: 0.35rem; }
  .hz-group--tabs { flex: 1 1 auto; flex-wrap: wrap; }
  .hz-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-right: 0.15rem; }
  .hz-btn {
    font: inherit; font-size: 0.8rem; font-weight: 600; line-height: 1;
    padding: 0.4rem 0.7rem; border: 1px solid #d8dee8; border-radius: 0.5rem;
    background: #f8fafc; color: #475569; cursor: pointer; white-space: nowrap;
  }
  .hz-btn:hover { background: #eef2f7; }
  .hz-btn.is-active { background: #0f172a; border-color: #0f172a; color: #fff; }
  .hz-tab { max-width: 16rem; overflow: hidden; text-overflow: ellipsis; }
  .hz-select { font: inherit; font-size: 0.8rem; font-weight: 600; padding: 0.4rem 0.6rem; border: 1px solid #d8dee8; border-radius: 0.5rem; background: #f8fafc; color: #475569; cursor: pointer; }

  .hz-caption { padding: 0.6rem 1rem 0; font-size: 0.82rem; color: #64748b; max-width: 820px; }
  .hz-caption b { color: #0f172a; }

  .hz-stage-wrap { display: flex; justify-content: center; padding: 1.25rem 1rem 3rem; }
  .hz-stage { width: 100%; transition: max-width .2s ease; }
  .hz-stage[data-vw="mobile"]  { max-width: 390px; }
  .hz-stage[data-vw="tablet"]  { max-width: 768px; }
  .hz-stage[data-vw="desktop"] { max-width: 1280px; }
  .hz-stage[data-vw="full"]    { max-width: none; }

  /* The canvas: carries the theme tokens AND is a container for @container queries. */
  .hz-frame {
    background: var(--bg-primary); color: var(--text-primary);
    font-family: var(--font-sans);
    border: 1px solid #cbd5e1; border-radius: 0.9rem; overflow: hidden;
    min-height: 60vh; padding: 1.75rem;
    container-type: inline-size; container-name: stage;
  }

  .variation { display: none; }
  .variation.is-active { display: block; }

  /* Accessibility: respect reduced motion for any animation you add. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* ============================================================
     Component styles go here, scoped under .mock so they don't leak.
     Use var(--bg-card) etc. for fidelity. For responsive behavior use
     @container (max-width: 480px) { ... } — the viewport toggle drives it.
     ============================================================ */

</style>
</head>
<body>

<div class="hz-toolbar">
  <div class="hz-group hz-group--tabs" id="hz-tabs"><!-- variation tabs injected here when >1 --></div>
  <div class="hz-group">
    <span class="hz-label">Tela</span>
    <button class="hz-btn" data-vw="mobile"  title="Mobile (390px)">📱</button>
    <button class="hz-btn" data-vw="tablet"  title="Tablet (768px)">💻</button>
    <button class="hz-btn is-active" data-vw="desktop" title="Desktop (1280px)">🖥</button>
    <button class="hz-btn" data-vw="full" title="Largura total">⛶</button>
  </div>
  <div class="hz-group">
    <span class="hz-label">Tema</span>
    <button class="hz-btn" id="hz-theme">☀️ Claro</button>
  </div>
  <div class="hz-group">
    <span class="hz-label">Fonte</span>
    <select class="hz-select" id="hz-font" autocomplete="off" title="Trocar a fonte (só visualização)">
      <option value="">Projeto</option>
      <option value="Inter">Inter</option>
      <option value="Plus Jakarta Sans">Plus Jakarta Sans</option>
      <option value="Sora">Sora</option>
      <option value="Space Grotesk">Space Grotesk</option>
      <option value="Manrope">Manrope</option>
      <option value="Fraunces">Fraunces (serifa)</option>
      <option value="Lora">Lora (serifa)</option>
      <option value="JetBrains Mono">JetBrains Mono</option>
      <option value="system-ui">Sistema</option>
    </select>
  </div>
</div>

<div class="hz-caption" id="hz-caption"></div>

<div class="hz-stage-wrap">
  <div class="hz-stage" data-vw="desktop">
    <div class="hz-frame" data-theme="light">

      <!-- ============================================================
           4. VARIATIONS — one <section> per variation. They show ONE AT A
           TIME via the top tabs (no vertical stacking). Give each a short
           data-title (tab label) and data-desc (trade-off, shown in caption).
           For a single variation, the tabs bar stays hidden automatically.
           ============================================================ -->

      <section class="variation is-active"
               data-title="Variação 1 — Nome"
               data-desc="Uma frase sobre a ideia desta variação e o trade-off.">
        <!-- <div class="mock"> ...component markup, using var(--bg-card) etc... </div> -->
      </section>

      <!-- Duplicate for more variations:
      <section class="variation" data-title="Variação 2 — Nome" data-desc="...">
        ...
      </section>
      -->

    </div>
  </div>
</div>

<script>
  // ---- harness behavior (variation tabs · viewport · theme) ----
  const frame    = document.querySelector('.hz-frame');
  const stage    = document.querySelector('.hz-stage');
  const caption  = document.getElementById('hz-caption');
  const tabsWrap = document.getElementById('hz-tabs');
  const variations = Array.from(document.querySelectorAll('.variation'));

  function showCaption(section) {
    const t = section.dataset.title || '';
    const d = section.dataset.desc || '';
    caption.innerHTML = d ? '<b>' + t + '</b> — ' + d : (t ? '<b>' + t + '</b>' : '');
  }

  function activate(i) {
    variations.forEach((v, j) => v.classList.toggle('is-active', i === j));
    tabsWrap.querySelectorAll('.hz-tab').forEach((b, j) => b.classList.toggle('is-active', i === j));
    if (variations[i]) showCaption(variations[i]);
  }

  // Build tabs only when there's more than one variation.
  if (variations.length > 1) {
    variations.forEach((v, i) => {
      const b = document.createElement('button');
      b.className = 'hz-btn hz-tab' + (i === 0 ? ' is-active' : '');
      b.textContent = v.dataset.title || ('Variação ' + (i + 1));
      b.addEventListener('click', () => activate(i));
      tabsWrap.appendChild(b);
    });
  }
  if (variations[0]) showCaption(variations[0]);

  // Viewport toggle.
  document.querySelectorAll('.hz-btn[data-vw]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.hz-btn[data-vw]').forEach(x => x.classList.remove('is-active'));
      btn.classList.add('is-active');
      stage.dataset.vw = btn.dataset.vw;
    });
  });

  // Theme toggle (live, single canvas).
  const themeBtn = document.getElementById('hz-theme');
  function setTheme(t) {
    frame.dataset.theme = t;
    themeBtn.textContent = t === 'dark' ? '🌙 Escuro' : '☀️ Claro';
  }
  themeBtn.addEventListener('click', () => setTheme(frame.dataset.theme === 'dark' ? 'light' : 'dark'));

  // Font selector — preview the mockup with different fonts. Loads each Google Font on demand
  // (only when first selected) and overrides --font-sans on the canvas. "Projeto" = the token font.
  const FONTS = {
    'Inter':             { stack: "'Inter', system-ui, sans-serif",             g: 'Inter:wght@400;500;600;700;800' },
    'Plus Jakarta Sans': { stack: "'Plus Jakarta Sans', system-ui, sans-serif", g: 'Plus+Jakarta+Sans:wght@400;500;600;700' },
    'Sora':              { stack: "'Sora', system-ui, sans-serif",              g: 'Sora:wght@400;500;600;700' },
    'Space Grotesk':     { stack: "'Space Grotesk', system-ui, sans-serif",     g: 'Space+Grotesk:wght@400;500;600;700' },
    'Manrope':           { stack: "'Manrope', system-ui, sans-serif",          g: 'Manrope:wght@400;500;600;700' },
    'Fraunces':          { stack: "'Fraunces', Georgia, serif",                 g: 'Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600' },
    'Lora':              { stack: "'Lora', Georgia, serif",                     g: 'Lora:wght@400;500;600;700' },
    'JetBrains Mono':    { stack: "'JetBrains Mono', ui-monospace, monospace",  g: 'JetBrains+Mono:wght@400;500;700' },
    'system-ui':         { stack: "system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif", g: null },
  };
  const fontSel = document.getElementById('hz-font');
  const loadedFonts = new Set();
  function applyFont(key) {
    if (!key || !FONTS[key]) { frame.style.removeProperty('--font-sans'); return; } // Projeto = volta ao token
    const f = FONTS[key];
    if (f.g && !loadedFonts.has(key)) {
      const l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=' + f.g + '&display=swap';
      document.head.appendChild(l);
      loadedFonts.add(key);
    }
    frame.style.setProperty('--font-sans', f.stack);
  }
  fontSel.addEventListener('change', () => applyFont(fontSel.value));

  // Initial state from the URL — ?vw=mobile&theme=dark&v=2 — so a screenshot or a
  // shared link opens straight in that state, with NO clicks (fast auto-checks).
  const p = new URLSearchParams(location.search);
  const vw = p.get('vw');
  const vwBtn = vw && document.querySelector('.hz-btn[data-vw="' + vw + '"]');
  if (vwBtn) {
    document.querySelectorAll('.hz-btn[data-vw]').forEach(x => x.classList.remove('is-active'));
    vwBtn.classList.add('is-active');
    stage.dataset.vw = vw;
  }
  if (p.get('theme') === 'dark' || p.get('theme') === 'light') setTheme(p.get('theme'));
  const vi = parseInt(p.get('v'), 10);
  if (!Number.isNaN(vi) && variations[vi - 1]) activate(vi - 1);
  const fk = p.get('font');
  if (fk !== null && FONTS[fk]) { fontSel.value = fk; applyFont(fk); }
</script>

</body>
</html>
